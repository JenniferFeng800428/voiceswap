<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceSwap — 語音角色替換工具</title>
  <meta name="description" content="上傳音檔，自動分析語者與語言，一鍵替換對話人物聲音。支援中文與英文。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="./index-BNXQqb-1.js"></script>
  <link rel="stylesheet" crossorigin href="./index-DIg2pGC-.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🎙️</span>
          <h1>VoiceSwap</h1>
        </div>
        <p class="tagline">語音角色替換工具</p>
      </div>
      <button id="settings-btn" class="icon-btn" title="設定 API Key">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content glass-card">
        <div class="modal-header">
          <h2>⚙️ API 設定</h2>
          <button id="settings-close" class="icon-btn">&times;</button>
        </div>
        <div class="modal-body" id="settings-body"></div>
      </div>
    </div>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Step Indicator -->
      <div id="step-indicator" class="step-indicator">
        <div class="step active" data-step="1">
          <div class="step-dot">1</div>
          <span>上傳音檔</span>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="2">
          <div class="step-dot">2</div>
          <span>分析結果</span>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="3">
          <div class="step-dot">3</div>
          <span>替換聲音</span>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="4">
          <div class="step-dot">4</div>
          <span>下載成品</span>
        </div>
      </div>

      <!-- Step 1: Upload -->
      <section id="step-upload" class="step-section active">
        <div class="glass-card" id="uploader-card"></div>
      </section>

      <!-- Step 2: Analysis -->
      <section id="step-analysis" class="step-section">
        <div class="glass-card" id="analyzer-card"></div>
      </section>

      <!-- Step 3: Voice Replace -->
      <section id="step-replace" class="step-section">
        <div class="glass-card" id="replacer-card"></div>
      </section>

      <!-- Step 4: Download -->
      <section id="step-download" class="step-section">
        <div class="glass-card" id="download-card">
          <div class="download-content">
            <div class="download-icon">✅</div>
            <h2>替換完成！</h2>
            <p id="download-info"></p>
            <div id="download-waveform"></div>
            <div class="download-actions">
              <button id="download-play" class="btn btn-secondary">▶ 播放預覽</button>
              <button id="download-btn" class="btn btn-primary">⬇ 下載音檔</button>
            </div>
            <button id="restart-btn" class="btn btn-ghost">🔄 重新開始</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="app-footer">
      <p>VoiceSwap — 語者分離與轉換技術驅動</p>
    </footer>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </div>

</body>
</html>
